# Post-deploy smoke check.
#
# Runs immediately after deploy.yml succeeds. Hits 5 read endpoints
# against the live API and asserts they return non-empty 200 responses.
# This catches the class of bug where the build succeeds and PM2 starts,
# but a runtime SQL/route error makes the app unusable.
#
# Does NOT require auth — exercises the public health endpoint and any
# routes accessible without a bearer (currently just /api/health).
# Authenticated smoke is a TODO once we have a CI service token.

name: Smoke after deploy

on:
  workflow_run:
    workflows: ["Deploy to Lightsail"]
    types: [completed]
    branches: [main]

jobs:
  smoke:
    name: Hit deployed endpoints
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for deployment to settle
        run: sleep 15

      - name: Health endpoint
        run: |
          curl --fail --silent --max-time 10 \
            https://${{ secrets.LIGHTSAIL_HOST }}/api/health \
            | grep '"status":"ok"' \
            && echo "✔ /api/health" \
            || (echo "✘ /api/health failed" && exit 1)

      - name: Frontend HTML loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            https://${{ secrets.LIGHTSAIL_HOST }})
          test "$STATUS" -eq 200 \
            && echo "✔ Frontend HTML 200" \
            || (echo "✘ Frontend returned $STATUS" && exit 1)

      - name: Frontend bundle reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            https://${{ secrets.LIGHTSAIL_HOST }}/assets/ \
            -L)
          # Either 200 (asset listing) or 404 (no listing but assets accessible)
          # is acceptable here; we'll do a more thorough check via Playwright E2E.
          test "$STATUS" -lt 500 \
            && echo "✔ Frontend assets reachable" \
            || (echo "✘ Assets returned $STATUS" && exit 1)

      # If smoke fails, alert via repo's notification channel.
      # Add a Slack/email step here once webhook secret is available.
