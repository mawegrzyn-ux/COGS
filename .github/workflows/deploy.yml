name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build React frontend
        working-directory: app
        env:
          VITE_AUTH0_DOMAIN:    ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE:  ''
          VITE_API_URL:         ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key:      ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source:   "app/dist/*"
          target:   "/var/www/menu-cogs/frontend"
          strip_components: 2

      - name: Deploy API and reload server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.LIGHTSAIL_HOST }}
          username:    ${{ secrets.LIGHTSAIL_USER }}
          key:         ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port:        22
          script_stop: true
          script: |
            cd /var/www/menu-cogs
            git pull origin main
            cd api && npm install --production --silent
            npm run migrate
            # Inject secrets into .env (add if missing, update if present)
            grep -q "^USDA_API_KEY=" .env \
              && sed -i "s|^USDA_API_KEY=.*|USDA_API_KEY=${{ secrets.USDA_API_KEY }}|" .env \
              || echo "USDA_API_KEY=${{ secrets.USDA_API_KEY }}" >> .env
            # Ensure uploads directory exists and is writable by the API
            mkdir -p /var/www/menu-cogs/uploads
            chmod 755 /var/www/menu-cogs/uploads
            # Inject APP_URL into .env — uses LIGHTSAIL_HOST secret (never hardcode the domain)
            grep -q "^APP_URL=" .env \
              && sed -i "s|^APP_URL=.*|APP_URL=https://${{ secrets.LIGHTSAIL_HOST }}|" .env \
              || echo "APP_URL=https://${{ secrets.LIGHTSAIL_HOST }}" >> .env
            # Generate SHARED_PAGE_SECRET if not already set (one-time, persists across deploys)
            grep -q "^SHARED_PAGE_SECRET=" .env \
              || echo "SHARED_PAGE_SECRET=$(openssl rand -hex 32)" >> .env
            pm2 restart menu-cogs-api
            # Ensure nginx allows uploads up to 11 MB (covers the 10 MB app limit + multipart overhead)
            grep -q 'client_max_body_size' /etc/nginx/sites-available/menu-cogs \
              || sudo sed -i '/server_name/a\    client_max_body_size 11m;' /etc/nginx/sites-available/menu-cogs
            # Add /uploads/ location block to nginx config (serves locally-uploaded images)
            grep -q 'location /uploads/' /etc/nginx/sites-available/menu-cogs \
              || sudo sed -i '/location \/ {/i\    location /uploads/ {\n        alias /var/www/menu-cogs/uploads/;\n        expires 1y;\n        add_header Cache-Control "public, immutable";\n    }\n' /etc/nginx/sites-available/menu-cogs
            sudo nginx -t && sudo nginx -s reload

      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --max-time 10 \
            https://${{ secrets.LIGHTSAIL_HOST }}/api/health \
            | grep '"status":"ok"' \
            && echo "✔ Health check passed" \
            || (echo "✘ Health check failed" && exit 1)
