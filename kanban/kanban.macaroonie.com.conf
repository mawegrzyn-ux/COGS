# Kanban Prioritiser — served at /kanban on the main COGS domain.
# Add these location blocks to the existing cogs.macaroonie.com server block
# (e.g. /etc/nginx/sites-available/menu-cogs):
#
#   sudo nano /etc/nginx/sites-available/menu-cogs
#   # paste the blocks below inside the server { } block
#   sudo nginx -t && sudo nginx -s reload

# Kanban API — proxy to Express on port 3002
location /kanban/api/ {
    rewrite ^/kanban/api/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}

# Kanban frontend — static assets
location /kanban/assets/ {
    alias /var/www/menu-cogs/kanban/frontend/assets/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Kanban SPA fallback — all /kanban/* routes serve index.html
location /kanban/ {
    alias /var/www/menu-cogs/kanban/frontend/;
    try_files $uri $uri/ /kanban/index.html;
}
